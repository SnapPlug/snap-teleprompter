name: SnapTeleprompter
options:
  bundleIdPrefix: com.snapavatar
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  SnapTeleprompter:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: folder
    entitlements:
      path: SnapTeleprompter.entitlements
    info:
      path: Info.plist
      properties:
        LSMinimumSystemVersion: "13.0"
        CFBundleName: "Snap Teleprompter"
        CFBundleDisplayName: "Snap Teleprompter"
        NSHumanReadableCopyright: "© 2026 snap_avatar"
        CFBundleIconFile: "AppIcon"
        LSUIElement: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapavatar.snap-teleprompter
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
        SWIFT_VERSION: "5.9"
